kind = "web"
previewPath = "/"
title = "M.S. Vision Opticals"
version = "1.0.0"
id = "artifacts/ms-vision-opticals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19803

[services.development]
run = "pnpm --filter @workspace/ms-vision-opticals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ms-vision-opticals", "run", "build" ]
publicDir = "artifacts/ms-vision-opticals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19803"
BASE_PATH = "/"
